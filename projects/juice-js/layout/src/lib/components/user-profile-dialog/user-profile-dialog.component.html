@if (loggedin) {
  <h3 mat-dialog-title>{{name}}</h3>
}
<div mat-dialog-content>
  @if (loggedin) {
    <div>
      @if (name) {
        <p>{{'Welcome' | translate}} {{name}}</p>
      }
      @if (email) {
        <p>{{ 'Email' | translate}}: {{email}}</p>
      }
      <!-- Logout -->
    </div>
  }
  @if (!loggedin) {
    <div>
      <p>{{ 'Please login to view your profile' | translate}}</p>
    </div>
  }
</div>
<div mat-dialog-actions>
  @if (loggedin) {
    <button mat-raised-button color="primary" (click)="logout()">{{ 'Logout' | translate}}</button>
  }
  <button mat-button mat-dialog-close cdkFocusInitial>{{ 'Close' | translate}}</button>
</div>
