@if (service.isEnabled()) {
  <div @enableTrigger class="search-container">
    <input type="search" [value]="service.query()"
      (input)="onSearchTextChange($event)" placeholder="Search">
    @if (service.query()) {
      <mat-icon (click)="clear($event)" color="primary">
      close</mat-icon>
    }
  </div>
}
