@if (isEnabled()) {
  <div @enableTrigger class="search-container">
    <input type="search" [(ngModel)] ="searchText"
      (keyup)="onSearchTextChange($event)" placeholder="Search">
    @if (searchText) {
      <mat-icon (click)="searchText='';onSearchTextChange($event)" color="primary">
      close</mat-icon>
    }
  </div>
}
