<mat-expansion-panel [expanded]="item.routerLink ? router.isActive(item.routerLink, false) : false" [hideToggle]="!isExpanded" [ngClass]="(item.routerLink && router.isActive(item.routerLink, false)) ? 'active' : ''">
  <mat-expansion-panel-header >
    <mat-list-item routerLink="{{ item.routerLink }}" [routerLinkActive]="['active']"
      [routerLinkActiveOptions]="{exact: true}">
      <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
      @if (isExpanded) {
        <span matListItemTitle style="margin-left: 4px;"> {{ item.label }}</span>
      }
    </mat-list-item>
  </mat-expansion-panel-header>
  <mat-nav-list>
    @for ( subitem of item.children ; track  subitem) {
      <mat-list-item routerLink="{{ subitem.routerLink }}" [routerLinkActive]="['active']"
        [routerLinkActiveOptions]="{exact: true}">
        <mat-icon matListItemIcon>{{ subitem.icon }}</mat-icon>
        @if (isExpanded) {
          <span matListItemTitle style="margin-left: 4px;"> {{ subitem.label }}</span>
        }
      </mat-list-item>
    }
  </mat-nav-list>
</mat-expansion-panel>
